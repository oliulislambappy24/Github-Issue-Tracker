<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Login Page -->
    <div id="login-page" class="page">
        <div class="login-container">
            <div class="logo">
                <i class="fab fa-github" style="font-size: 50px; color: #333; margin-bottom: 10px;"></i>
            </div>
            <h2>GitHub Issues Tracker</h2>
            <p style="color: #666; margin-bottom: 20px;">Sign in to manage your issues</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <small>Default: admin</small>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <small>Default: admin123</small>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            
            <div class="demo-creds">
                <div class="separator">OR</div>
                <p>Demo Credentials:</p>
                <div class="creds-box">
                    <p><strong>Username:</strong> admin <br><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
