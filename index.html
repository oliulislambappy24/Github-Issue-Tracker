<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Login Page -->
    <div id="login-page" class="page">
        <div class="login-container">
            <div class="logo">
                <i class="fab fa-github" style="font-size: 50px; color: #333; margin-bottom: 10px;"></i>
            </div>
            <h2>GitHub Issues Tracker</h2>
            <p style="color: #666; margin-bottom: 20px;">Sign in to manage your issues</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter Username" required>
                    <small>Default: admin</small>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter Password" required>
                    <small>Default: admin123</small>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            
            <div class="demo-creds">
                <div class="separator">OR</div>
                <p>Demo Credentials:</p>
                <div class="creds-box">
                    <p><strong>Username:</strong> admin <br><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
    </div>

    
    <!-- Main Page -->
    <div id="main-page" class="page hidden">
        <nav class="navbar">
            <div class="nav-left">
                <i class="fab fa-github"></i>
                <span class="brand">GitHub Issues Tracker</span>
            </div>
            <div class="nav-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search issues...">
                </div>
                <button class="btn-new-issue">+ New Issue</button>
            </div>
        </nav>

        <main class="content">
            <div class="tabs-container">
                <div class="tabs">
                    <button class="tab-btn active" data-filter="all">All</button>
                    <button class="tab-btn" data-filter="open">Open</button>
                    <button class="tab-btn" data-filter="closed">Closed</button>
                </div>
            </div>

            <div class="issue-summary">
                <div class="summary-left">
                    <div class="summary-icon-circle">
                        <img src="./assets/Aperture.png" alt="" class="summary-img">
                    </div>
                    <div>
                        <h3 id="issue-count">0 Issues</h3>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <div class="summary-right">
                    <span><span class="dot green"></span> Open</span>
                    <span><span class="dot purple"></span> Closed</span>
                </div>
            </div>

            <div id="loader" class="loader hidden"></div>

            <div id="issues-grid" class="issues-grid">
            </div>
        </main>
    </div>


    

    <!-- Modal -->
    <div id="issue-modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-body">
            </div>
        </div>
    </div>

    <script src="script.js"></script>





</body>
</html>
